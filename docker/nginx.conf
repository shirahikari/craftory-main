
server {
    listen 80;
    server_name craftory.io.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name craftory.io.vn;

    ssl_certificate /etc/letsencrypt/live/craftory.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/craftory.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Hide nginx version
    server_tokens off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Restrict admin and employee pages — redirect to home if session cookie is absent.
    # Cookie name must match SESSION_COOKIE in backend/src/plugins/session.js ('session_id').
    location ~ ^/pages/(admin|employee)/ {
        if ($cookie_session_id = "") { return 302 /; }
        try_files $uri $uri/ =404;
    }

    # Static files
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy API requests to backend — preserve full /api/v1/... path
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Forward cookies correctly
        proxy_pass_header Set-Cookie;
    }
}
