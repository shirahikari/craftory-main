<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cửa hàng — Craftory</title>
  <meta name="description" content="Khám phá bộ kit thủ công, sách hướng dẫn cho bé 4–12 tuổi. Lọc theo độ tuổi, giá và loại sản phẩm.">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* ═══ Shop Layout ═══ */
    .shop-wrap { display:grid; grid-template-columns:272px 1fr; gap:28px; padding:36px 0 72px; align-items:start }

    /* ═══ Filter Sidebar ═══ */
    .filter-sidebar {
      position:sticky; top:108px;
      background:var(--surface);
      border:1.5px solid var(--parchment-2);
      border-radius:20px;
      box-shadow:var(--sh-md);
      overflow:hidden;
    }
    .filter-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 20px 14px;
      border-bottom:1.5px solid var(--parchment-2);
      background:linear-gradient(135deg,var(--orange-pale),var(--cream-2));
    }
    .filter-head-left { display:flex; align-items:center; gap:8px }
    .filter-head-icon { font-size:1.1rem }
    .filter-head h3 { font-family:var(--font-h); font-size:.92rem; font-weight:800; color:var(--ink); margin:0 }
    .filter-active-count {
      display:none;
      background:var(--orange); color:#fff;
      font-family:var(--font-h); font-size:.66rem; font-weight:700;
      padding:2px 8px; border-radius:var(--r-full);
      min-width:20px; text-align:center;
    }
    .filter-active-count.show { display:inline-flex; align-items:center; justify-content:center }
    .filter-reset {
      font-family:var(--font-h); font-size:.78rem; font-weight:700;
      color:var(--terracotta); background:none; border:none; cursor:pointer;
      padding:4px 8px; border-radius:var(--r-md); transition:all .15s;
    }
    .filter-reset:hover { background:var(--orange-pale) }

    /* Filter sections */
    .filter-section { padding:16px 20px; border-bottom:1px solid var(--parchment-2) }
    .filter-section:last-child { border-bottom:none; padding-bottom:20px }
    .filter-section-label {
      font-family:var(--font-h); font-size:.72rem; font-weight:800;
      text-transform:uppercase; letter-spacing:.1em;
      color:var(--ink-4); margin-bottom:10px; display:flex;
      align-items:center; gap:6px;
    }
    .filter-section-label::before {
      content:''; width:3px; height:12px;
      background:var(--orange); border-radius:2px; display:inline-block;
    }

    /* Category filter chips */
    .filter-chips { display:flex; flex-direction:column; gap:4px }
    .filter-chip {
      display:flex; align-items:center; justify-content:space-between;
      padding:9px 12px; border-radius:10px;
      font-family:var(--font-h); font-size:.86rem; font-weight:600;
      color:var(--ink-3); background:transparent; border:1.5px solid transparent;
      cursor:pointer; transition:all .18s; text-align:left;
    }
    .filter-chip:hover { background:var(--parchment); color:var(--ink); border-color:var(--parchment-2) }
    .filter-chip.active {
      background:var(--orange-pale); color:var(--orange);
      border-color:rgba(232,93,4,.25);
      box-shadow:0 2px 8px rgba(232,93,4,.1);
    }
    .filter-chip-count {
      font-size:.72rem; font-weight:700;
      background:var(--parchment-2); color:var(--ink-4);
      padding:2px 8px; border-radius:var(--r-full); min-width:24px; text-align:center;
    }
    .filter-chip.active .filter-chip-count {
      background:rgba(232,93,4,.15); color:var(--orange);
    }
    .filter-chip-icon { font-size:.9rem; margin-right:6px }

    /* Age range filter */
    .filter-age-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px }
    .filter-age-btn {
      padding:8px 6px; border-radius:10px;
      font-family:var(--font-h); font-size:.8rem; font-weight:700;
      color:var(--ink-3); background:var(--parchment); border:1.5px solid transparent;
      cursor:pointer; transition:all .18s; text-align:center;
    }
    .filter-age-btn:hover { background:var(--orange-pale); color:var(--orange) }
    .filter-age-btn.active {
      background:var(--orange); color:#fff;
      border-color:var(--orange);
      box-shadow:0 3px 10px rgba(232,93,4,.3);
    }

    /* ── Price range inputs ── */
    .price-inputs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px }
    .price-input-wrap {
      display:flex; flex-direction:column; gap:5px;
    }
    .price-input-wrap label {
      font-family:var(--font-h); font-size:.72rem; font-weight:700;
      color:var(--ink-4); letter-spacing:.04em; text-transform:uppercase;
    }
    .price-input {
      width:100%; padding:10px 12px;
      font-family:var(--font-h); font-size:.9rem; font-weight:700; color:var(--ink);
      background:var(--surface); border:1.5px solid var(--parchment-2);
      border-radius:10px; outline:none; transition:all .2s; box-sizing:border-box;
      /* Hide browser number spinners */
      -moz-appearance:textfield;
    }
    .price-input::-webkit-inner-spin-button,
    .price-input::-webkit-outer-spin-button { display:none }
    .price-input:focus { border-color:var(--orange); background:var(--cream); box-shadow:0 0 0 3px rgba(232,93,4,.08) }
    .price-input::placeholder { color:var(--ink-5); font-weight:400 }
    .price-separator {
      display:flex; align-items:flex-end; padding-bottom:10px;
      font-family:var(--font-h); font-size:.8rem; font-weight:700; color:var(--ink-5);
    }
    /* Quick preset pills */
    .price-quick { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px }
    .price-quick-btn {
      font-family:var(--font-h); font-size:.76rem; font-weight:700;
      color:var(--ink-3); background:var(--parchment); border:1.5px solid var(--parchment-2);
      border-radius:var(--r-full); padding:5px 12px; cursor:pointer; transition:all .18s;
      line-height:1.4;
    }
    .price-quick-btn:hover { background:var(--orange-pale); color:var(--orange); border-color:rgba(232,93,4,.25) }
    .price-quick-btn.active { background:var(--orange); color:#fff; border-color:var(--orange); box-shadow:0 2px 8px rgba(232,93,4,.25) }

    /* Badge filter — horizontal pills */
    .filter-badge-row { display:flex; flex-wrap:wrap; gap:6px }
    .badge-pill {
      display:inline-flex; align-items:center; gap:5px;
      font-family:var(--font-h); font-size:.78rem; font-weight:700;
      padding:6px 12px; border-radius:var(--r-full);
      border:1.5px solid var(--parchment-2); background:var(--surface);
      color:var(--ink-3); cursor:pointer; transition:all .18s;
    }
    .badge-pill:hover { border-color:var(--terra-3); background:var(--parchment) }
    .badge-pill.active.all { background:var(--ink); color:#fff; border-color:var(--ink) }
    .badge-pill.active.hot { background:#FEE2E2; color:#B91C1C; border-color:#FECACA }
    .badge-pill.active.new { background:#DBEAFE; color:#1E40AF; border-color:#BFDBFE }
    .badge-pill.active.sale { background:#DCFCE7; color:#166534; border-color:#BBF7D0 }
    .badge-pill.active.none { background:var(--parchment); color:var(--ink-3); border-color:var(--parchment-2) }

    /* Mobile filter toggle */
    .filter-mobile-toggle {
      display:none;
      width:100%; padding:13px 18px;
      font-family:var(--font-h); font-size:.9rem; font-weight:700;
      color:var(--ink-2); background:var(--surface);
      border:1.5px solid var(--parchment-2); border-radius:14px;
      cursor:pointer; transition:all .2s;
      align-items:center; justify-content:space-between;
      box-shadow:var(--sh-sm); margin-bottom:16px;
    }
    .filter-mobile-toggle:hover { border-color:var(--terra-3); background:var(--parchment) }
    .filter-mobile-toggle-left { display:flex; align-items:center; gap:10px }
    .filter-mobile-toggle-right { display:flex; align-items:center; gap:8px }

    /* Mobile drawer */
    .filter-mobile-drawer {
      display:none; position:fixed; inset:0; z-index:700;
      background:rgba(26,18,9,.6); backdrop-filter:blur(4px);
    }
    .filter-mobile-drawer.open { display:flex; align-items:flex-end }
    .filter-drawer-panel {
      width:100%; background:var(--surface);
      border-radius:24px 24px 0 0; padding:0;
      max-height:88vh; overflow-y:auto;
      animation:slideUp .3s var(--ease);
    }
    @keyframes slideUp { from { transform:translateY(100%) } to { transform:translateY(0) } }
    .filter-drawer-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 20px; border-bottom:1.5px solid var(--parchment-2);
      position:sticky; top:0; background:var(--surface); z-index:1;
    }

    /* ═══ Toolbar / Search ═══ */
    .shop-toolbar {
      display:flex; align-items:center; gap:12px;
      margin-bottom:22px; flex-wrap:wrap;
    }
    .search-field {
      flex:1; min-width:200px;
      display:flex; align-items:center;
      background:var(--surface); border:1.5px solid var(--parchment-2);
      border-radius:12px; padding:0 4px 0 14px;
      box-shadow:var(--sh-sm); transition:all .2s;
    }
    .search-field:focus-within {
      border-color:var(--orange);
      box-shadow:0 0 0 3px rgba(232,93,4,.1), var(--sh-sm);
    }
    .search-field-icon { font-size:1rem; color:var(--ink-4); flex-shrink:0; margin-right:4px }
    .search-field input {
      flex:1; border:none; background:transparent;
      font-family:var(--font-body); font-size:.92rem; color:var(--ink);
      padding:11px 4px; outline:none;
    }
    .search-field input::placeholder { color:var(--ink-5) }
    .search-clear {
      width:30px; height:30px; border-radius:50%;
      background:none; border:none; cursor:pointer;
      color:var(--ink-4); display:none; align-items:center; justify-content:center;
      font-size:.85rem; transition:all .15s; flex-shrink:0;
    }
    .search-clear.show { display:flex }
    .search-clear:hover { background:var(--parchment); color:var(--rose) }

    /* Sort select — custom */
    .sort-wrapper { position:relative; flex-shrink:0 }
    .sort-wrapper::after {
      content:'⌄'; position:absolute; right:13px; top:50%; transform:translateY(-55%);
      pointer-events:none; color:var(--ink-4); font-size:1rem; font-weight:700;
    }
    .sort-select {
      appearance:none; -webkit-appearance:none;
      padding:10px 38px 10px 15px;
      font-family:var(--font-h); font-size:.87rem; font-weight:600;
      color:var(--ink-2); background:var(--surface);
      border:1.5px solid var(--parchment-2); border-radius:12px;
      cursor:pointer; outline:none; transition:all .2s; box-shadow:var(--sh-sm);
    }
    .sort-select:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(232,93,4,.1) }
    .sort-select:hover { border-color:var(--terra-3) }

    /* View toggle */
    .view-toggle { display:flex; background:var(--parchment); border-radius:10px; padding:3px; gap:2px; flex-shrink:0 }
    .view-btn {
      width:34px; height:34px; border-radius:8px; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-size:.95rem;
      color:var(--ink-4); background:transparent; transition:all .18s;
    }
    .view-btn.active { background:var(--surface); color:var(--orange); box-shadow:0 1px 4px rgba(0,0,0,.12) }

    /* Result count */
    .result-count {
      font-family:var(--font-h); font-size:.84rem; color:var(--ink-4);
      margin-left:auto; flex-shrink:0;
      background:var(--parchment); padding:6px 14px; border-radius:var(--r-full);
    }
    .result-count strong { color:var(--orange) }

    /* Active filter tags */
    .active-filters { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px }
    .active-filter-tag {
      display:inline-flex; align-items:center; gap:6px;
      font-family:var(--font-h); font-size:.78rem; font-weight:700;
      background:var(--orange-pale); color:var(--orange);
      border:1.5px solid rgba(232,93,4,.2);
      border-radius:var(--r-full); padding:5px 12px;
    }
    .active-filter-tag button {
      width:18px; height:18px; border-radius:50%; background:var(--orange);
      color:#fff; border:none; cursor:pointer; font-size:.7rem;
      display:flex; align-items:center; justify-content:center; transition:all .15s;
    }
    .active-filter-tag button:hover { background:var(--terracotta); transform:scale(1.1) }

    /* Products grid */
    .products-main { min-height:400px }
    .grid-3col { display:grid; grid-template-columns:repeat(3,1fr); gap:20px }
    .grid-2col { display:grid; grid-template-columns:repeat(2,1fr); gap:20px }
    .grid-list { display:flex; flex-direction:column; gap:14px }

    /* List view product card */
    .product-card-list {
      display:grid; grid-template-columns:120px 1fr auto;
      background:var(--surface); border:1.5px solid var(--parchment-2);
      border-radius:var(--r-xl); overflow:hidden; cursor:pointer;
      transition:all .25s var(--ease); box-shadow:var(--sh-sm);
    }
    .product-card-list:hover { transform:translateY(-2px); box-shadow:var(--sh-lg); border-color:var(--terra-3) }
    .product-card-list .list-img {
      background:var(--parchment); display:flex; align-items:center;
      justify-content:center; font-size:3.2rem; aspect-ratio:1;
    }
    .product-card-list .list-body { padding:16px 18px }
    .product-card-list .list-actions { padding:16px; display:flex; flex-direction:column; justify-content:space-between; align-items:flex-end; min-width:110px }

    /* Empty state */
    .empty-state {
      grid-column:1/-1; text-align:center; padding:80px 24px;
    }
    .empty-state-emoji { font-size:4rem; margin-bottom:16px }
    .empty-state h3 { margin-bottom:8px; font-size:1.2rem }
    .empty-state p { color:var(--ink-4); margin-bottom:24px; font-size:.9rem }

    /* ═══ Responsive ═══ */
    @media(max-width:1024px) {
      .shop-wrap { grid-template-columns:1fr }
      .filter-sidebar { display:none }
      .filter-mobile-toggle { display:flex }
    }
    @media(max-width:640px) {
      .grid-3col { grid-template-columns:repeat(2,1fr); gap:12px }
      .grid-2col { grid-template-columns:1fr }
      .shop-toolbar { gap:8px }
      .result-count { display:none }
      .view-toggle { display:none }
      .sort-select { font-size:.82rem; padding:9px 32px 9px 12px }
    }
    @media(max-width:380px) {
      .grid-3col { grid-template-columns:1fr }
    }
  </style>
</head>
<body>
<div id="login-modal-mount"></div>
<div id="hdr"></div>

<!-- Hero -->
<div style="background:linear-gradient(135deg,#1A1209 0%,#3D2B1F 55%,var(--terracotta) 100%);padding:52px 0 44px;position:relative;overflow:hidden">
  <div style="position:absolute;right:-60px;top:-60px;width:400px;height:400px;border-radius:50%;background:rgba(232,93,4,.1);pointer-events:none"></div>
  <div class="container">
    <div class="breadcrumb" style="color:rgba(255,255,255,.45);margin-bottom:14px">
      <a href="../index.html" style="color:rgba(255,255,255,.45)">Trang chủ</a> › Cửa hàng
    </div>
    <h1 style="color:#fff;margin-bottom:10px">Cửa hàng Craftory</h1>
    <p style="color:rgba(255,255,255,.7);font-size:.97rem;max-width:480px;line-height:1.7;margin:0">Bộ kit thủ công, sách hướng dẫn và gói thành viên cho bé 4–12 tuổi tại TP.HCM.</p>
  </div>
</div>

<div class="container">
  <div class="shop-wrap">

    <!-- ═══ FILTER SIDEBAR (Desktop) ═══ -->
    <aside class="filter-sidebar" id="filterSidebar">
      <div class="filter-head">
        <div class="filter-head-left">
          <span class="filter-head-icon">⚡</span>
          <h3>Bộ lọc</h3>
          <span class="filter-active-count" id="activeCount">0</span>
        </div>
        <button class="filter-reset" onclick="resetFilters()" id="resetBtn">Xoá tất cả</button>
      </div>

      <!-- Category -->
      <div class="filter-section">
        <div class="filter-section-label">Loại sản phẩm</div>
        <div class="filter-chips" id="catChips">
          <button class="filter-chip active" data-filter="cat" data-val="all" onclick="setFilter('cat','all',this)">
            <span><span class="filter-chip-icon">🛍</span>Tất cả</span>
            <span class="filter-chip-count">9</span>
          </button>
          <button class="filter-chip" data-filter="cat" data-val="kit" onclick="setFilter('cat','kit',this)">
            <span><span class="filter-chip-icon">✂️</span>Bộ kit thủ công</span>
            <span class="filter-chip-count">8</span>
          </button>
          <button class="filter-chip" data-filter="cat" data-val="book" onclick="setFilter('cat','book',this)">
            <span><span class="filter-chip-icon">📖</span>Sách hướng dẫn</span>
            <span class="filter-chip-count">1</span>
          </button>
        </div>
      </div>

      <!-- Age range -->
      <div class="filter-section">
        <div class="filter-section-label">Độ tuổi</div>
        <div class="filter-age-grid">
          <button class="filter-age-btn active" data-filter="age" data-val="all" onclick="setFilter('age','all',this)">Tất cả</button>
          <button class="filter-age-btn" data-filter="age" data-val="4-6" onclick="setFilter('age','4-6',this)">4–6 tuổi</button>
          <button class="filter-age-btn" data-filter="age" data-val="6-9" onclick="setFilter('age','6-9',this)">6–9 tuổi</button>
          <button class="filter-age-btn" data-filter="age" data-val="9-12" onclick="setFilter('age','9-12',this)">9–12 tuổi</button>
        </div>
      </div>

      <!-- Price -->
      <div class="filter-section">
        <div class="filter-section-label">Khoảng giá</div>
        <div class="price-inputs">
          <div class="price-input-wrap">
            <label for="priceMin">Từ (đ)</label>
            <input class="price-input" type="number" id="priceMin" min="0" placeholder="Tối thiểu" oninput="applyFilters()" onkeydown="return event.key!=='-'&&event.key!=='e'">
          </div>
          <div class="price-input-wrap">
            <label for="priceMax">Đến (đ)</label>
            <input class="price-input" type="number" id="priceMax" min="0" placeholder="Tối đa" oninput="applyFilters()" onkeydown="return event.key!=='-'&&event.key!=='e'">
          </div>
        </div>
        <div class="price-quick">
          <button class="price-quick-btn active" data-val="all" onclick="setPricePreset('all',this)">Tất cả</button>
          <button class="price-quick-btn" data-val="u70" onclick="setPricePreset('u70',this)">Dưới 70K</button>
          <button class="price-quick-btn" data-val="70-90" onclick="setPricePreset('70-90',this)">70–90K</button>
          <button class="price-quick-btn" data-val="o90" onclick="setPricePreset('o90',this)">Trên 90K</button>
        </div>
      </div>

      <!-- Badge -->
      <div class="filter-section">
        <div class="filter-section-label">Nhãn sản phẩm</div>
        <div class="filter-badge-row">
          <button class="badge-pill active all" data-filter="badge" data-val="all" onclick="setFilter('badge','all',this)">Tất cả</button>
          <button class="badge-pill hot" data-filter="badge" data-val="hot" onclick="setFilter('badge','hot',this)">🔥 Bán chạy</button>
          <button class="badge-pill new" data-filter="badge" data-val="new" onclick="setFilter('badge','new',this)">✨ Mới</button>
          <button class="badge-pill sale" data-filter="badge" data-val="sale" onclick="setFilter('badge','sale',this)">🏷 Giảm giá</button>
        </div>
      </div>
    </aside>

    <!-- ═══ MAIN CONTENT ═══ -->
    <div class="products-main">

      <!-- Mobile filter toggle -->
      <button class="filter-mobile-toggle" onclick="openMobileFilter()">
        <div class="filter-mobile-toggle-left">
          <span style="font-size:1.1rem">⚡</span>
          <span>Bộ lọc & Sắp xếp</span>
          <span class="filter-active-count" id="activeCountMobile" style="display:none"></span>
        </div>
        <div class="filter-mobile-toggle-right">
          <span id="filterSummaryText" style="font-size:.78rem;color:var(--ink-4)">12 sản phẩm</span>
          <span style="color:var(--ink-4);font-size:.9rem">›</span>
        </div>
      </button>

      <!-- Toolbar -->
      <div class="shop-toolbar">
        <!-- Search -->
        <div class="search-field">
          <span class="search-field-icon">🔍</span>
          <input type="search" id="searchQ" placeholder="Tìm tên, chủ đề, độ tuổi..." oninput="onSearch(this)" onkeydown="if(event.key==='Escape')clearSearch()">
          <button class="search-clear" id="searchClear" onclick="clearSearch()" title="Xoá tìm kiếm">✕</button>
        </div>

        <!-- Sort -->
        <div class="sort-wrapper">
          <select class="sort-select" id="sortSel" onchange="applyFilters()">
            <option value="">Mặc định</option>
            <option value="pa">Giá: thấp → cao</option>
            <option value="pd">Giá: cao → thấp</option>
            <option value="az">Tên A → Z</option>
            <option value="pop">Phổ biến nhất</option>
          </select>
        </div>

        <!-- View toggle -->
        <div class="view-toggle">
          <button class="view-btn active" id="gridView" onclick="setView('grid')" title="Dạng lưới">⊞</button>
          <button class="view-btn" id="listView" onclick="setView('list')" title="Dạng danh sách">≡</button>
        </div>

        <!-- Count -->
        <div class="result-count" id="countLbl">Đang tải...</div>
      </div>

      <!-- Active filter tags -->
      <div class="active-filters" id="activeTags"></div>

      <!-- Products grid -->
      <div id="productsGrid" class="grid-3col"></div>

      <!-- Empty state -->
      <div id="emptyState" style="display:none" class="empty-state">
        <div class="empty-state-emoji">🔍</div>
        <h3>Không tìm thấy sản phẩm nào</h3>
        <p>Thử thay đổi bộ lọc hoặc từ khoá tìm kiếm của bạn.</p>
        <button class="btn btn-primary btn-lg" onclick="resetFilters()">Xoá tất cả bộ lọc</button>
      </div>
    </div>
  </div>
</div>

<!-- Mobile Filter Drawer -->
<div class="filter-mobile-drawer" id="mobileDrawer" onclick="closeMobileFilter(event)">
  <div class="filter-drawer-panel">
    <div class="filter-drawer-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:1.1rem">⚡</span>
        <span style="font-family:var(--font-h);font-size:.95rem;font-weight:800;color:var(--ink)">Bộ lọc sản phẩm</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <button style="font-family:var(--font-h);font-size:.8rem;font-weight:700;color:var(--terracotta);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:var(--r-md)" onclick="resetFilters()">Xoá tất cả</button>
        <button style="width:32px;height:32px;border-radius:50%;background:var(--parchment);border:1.5px solid var(--parchment-2);font-size:1rem;color:var(--ink-3);cursor:pointer" onclick="closeMobileFilter()">✕</button>
      </div>
    </div>
    <!-- Same filters as desktop, clone-rendered by JS -->
    <div id="mobileFilterBody" style="padding:4px 0 16px"></div>
    <div style="padding:16px 20px;border-top:1.5px solid var(--parchment-2);display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeMobileFilter()">Đóng</button>
      <button class="btn btn-primary" style="flex:2" onclick="closeMobileFilter()">Xem kết quả (<span id="mobileResultCount">0</span>)</button>
    </div>
  </div>
</div>

<div id="ftr"></div>
<script src="../assets/js/env.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/app.js"></script>
<script>
document.getElementById('hdr').innerHTML = renderHeader('shop','../');
document.getElementById('ftr').innerHTML = renderFooter('../');

/* ─── State ─── */
const F = { cat:'all', badge:'all', age:'all', priceMin:0, priceMax:Infinity };
let ALL_PRODUCTS = [];
let _pricePreset = 'all';
let _view = 'grid';
let _results = [];

/* ─── Filter setters ─── */
function setFilter(k, v, btn) {
  F[k] = v;
  // Update active class within same group
  if (btn) {
    const group = btn.closest('.filter-chips, .filter-age-grid, .filter-badge-row');
    if (group) group.querySelectorAll('[data-filter="'+k+'"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Sync mobile too
    document.querySelectorAll(`[data-filter="${k}"][data-val="${v}"]`).forEach(b => {
      b.closest('.filter-chips, .filter-age-grid, .filter-badge-row')
        ?.querySelectorAll(`[data-filter="${k}"]`).forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  }
  applyFilters();
}

function setPricePreset(val, btn) {
  _pricePreset = val;
  document.querySelectorAll('.price-quick-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`.price-quick-btn[data-val="${val}"]`).forEach(b => b.classList.add('active'));
  const minEl = document.getElementById('priceMin');
  const maxEl = document.getElementById('priceMax');
  if (val === 'all')   { F.priceMin=0; F.priceMax=Infinity; minEl.value=''; maxEl.value=''; }
  if (val === 'u70')   { F.priceMin=0; F.priceMax=69999;    minEl.value=''; maxEl.value='69999'; }
  if (val === '70-90') { F.priceMin=70000; F.priceMax=90000; minEl.value='70000'; maxEl.value='90000'; }
  if (val === 'o90')   { F.priceMin=90001; F.priceMax=Infinity; minEl.value='90001'; maxEl.value=''; }
  applyFilters();
}

/* ─── Search ─── */
function onSearch(el) {
  const clearBtn = document.getElementById('searchClear');
  clearBtn.classList.toggle('show', el.value.length > 0);
  applyFilters();
}
function clearSearch() {
  const el = document.getElementById('searchQ');
  el.value = '';
  document.getElementById('searchClear').classList.remove('show');
  el.focus();
  applyFilters();
}

/* ─── View toggle ─── */
function setView(v) {
  _view = v;
  document.getElementById('gridView').classList.toggle('active', v === 'grid');
  document.getElementById('listView').classList.toggle('active', v === 'list');
  renderProducts(_results);
}

/* ─── Main filter logic ─── */
function applyFilters() {
  const q = document.getElementById('searchQ').value.trim().toLowerCase();
  const s = document.getElementById('sortSel').value;

  // Price inputs — empty = no limit (fix: don't persist stale values)
  const minVal = document.getElementById('priceMin').value.trim();
  const maxVal = document.getElementById('priceMax').value.trim();
  const minRaw = minVal === '' ? 0        : parseInt(minVal);
  const maxRaw = maxVal === '' ? Infinity : parseInt(maxVal);
  // Only update if valid numbers
  F.priceMin = isNaN(minRaw) ? 0        : Math.max(0, minRaw);
  F.priceMax = isNaN(maxRaw) ? Infinity : Math.max(F.priceMin, maxRaw);

  let list = ALL_PRODUCTS.filter(p => {
    if (F.cat !== 'all' && p.cat !== F.cat) return false;
    if (F.badge !== 'all' && p.badge !== F.badge) return false;
    if (F.age === '4-6'  && !p.age.includes('4') && !p.age.includes('5') && !p.age.includes('6')) return false;
    if (F.age === '6-9'  && !p.age.includes('6') && !p.age.includes('7') && !p.age.includes('8') && !p.age.includes('9')) return false;
    if (F.age === '9-12' && !p.age.includes('9') && !p.age.includes('10') && !p.age.includes('11') && !p.age.includes('12')) return false;
    if (F.priceMax !== Infinity && p.price > F.priceMax) return false;
    if (F.priceMin > 0 && p.price < F.priceMin) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.desc.toLowerCase().includes(q) && !p.col.toLowerCase().includes(q) && !p.age.includes(q)) return false;
    return true;
  });

  if (s === 'pa')  list.sort((a,b) => a.price - b.price);
  else if (s === 'pd') list.sort((a,b) => b.price - a.price);
  else if (s === 'az') list.sort((a,b) => a.name.localeCompare(b.name,'vi'));
  else if (s === 'pop') list.sort((a,b) => (b.badge === 'hot' ? 1 : 0) - (a.badge === 'hot' ? 1 : 0));

  _results = list;
  updateActiveTags();
  updateCount(list.length);
  renderProducts(list);
  document.getElementById('mobileResultCount').textContent = list.length;
}

function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  const empty = document.getElementById('emptyState');
  if (!list.length) {
    grid.innerHTML = ''; grid.className = ''; empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  if (_view === 'list') {
    grid.className = 'grid-list';
    grid.innerHTML = list.map(p => `
    <div class="product-card-list" onclick="location.href='product-detail.html?id=${p.id}'">
      <div class="list-img" style="background:${p.bg||'var(--parchment)'}">
        <img src="../assets/images/product-images/product-${p.id}.png" alt="${esc(p.name)}"
          style="width:100%;height:100%;object-fit:cover"
          onerror="this.src='../assets/images/products/kit-${p.id}.svg';this.style.objectFit='contain';this.style.padding='8px';this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='block'}">
        <span style="display:none;font-size:2.8rem">${esc(p.em||'🎨')}</span>
      </div>
      <div class="list-body">
        <div style="font-family:var(--font-h);font-size:.72rem;font-weight:600;color:var(--ink-4);margin-bottom:4px">${esc(p.col)} · ${esc(p.age)}</div>
        <div style="font-family:var(--font-display);font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:6px">${esc(p.name)}</div>
        <div style="font-size:.84rem;color:var(--ink-4);line-height:1.6">${esc(p.desc)}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
          ${p.badge ? `<span class="product-badge ${p.badge}" style="position:static;font-size:.7rem">${p.badge==='hot'?'🔥 Bán chạy':p.badge==='new'?'✨ Mới':'🏷 Giảm giá'}</span>` : ''}
          <span class="tag">${esc(p.age)}</span>
        </div>
      </div>
      <div class="list-actions">
        <div>
          ${p.old ? `<div style="font-size:.8rem;color:var(--ink-5);text-decoration:line-through;font-family:var(--font-h)">${p.old.toLocaleString('vi-VN')}đ</div>` : ''}
          <div style="font-family:var(--font-h);font-size:1.05rem;font-weight:800;color:var(--orange)">${p.price.toLocaleString('vi-VN')}đ</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();Cart.add(${p.id})" style="white-space:nowrap">+ Giỏ hàng</button>
      </div>
    </div>`).join('');
  } else {
    grid.className = 'grid-3col';
    grid.innerHTML = list.map(p => productCardHTML(p,'../')).join('');
  }
}

function updateCount(n) {
  const el = document.getElementById('countLbl');
  const mob = document.getElementById('filterSummaryText');
  el.innerHTML = `<strong>${n}</strong> sản phẩm`;
  mob.textContent = `${n} sản phẩm`;
}

function updateActiveTags() {
  const tags = [];
  const activeCount = document.getElementById('activeCount');
  const activeCountMob = document.getElementById('activeCountMobile');
  let count = 0;

  const catMap = { kit:'Bộ kit', book:'Sách hướng dẫn', membership:'Gói thành viên' };
  const badgeMap = { hot:'🔥 Bán chạy', new:'✨ Mới', sale:'🏷 Giảm giá' };

  if (F.cat !== 'all') { tags.push({ label: catMap[F.cat]||F.cat, clear:()=>{ setFilter('cat','all'); document.querySelector('[data-filter="cat"][data-val="all"]')?.classList.add('active'); document.querySelectorAll('[data-filter="cat"]:not([data-val="all"])').forEach(b=>b.classList.remove('active')); } }); count++; }
  if (F.badge !== 'all') { tags.push({ label: badgeMap[F.badge]||F.badge, clear:()=>{ setFilter('badge','all'); document.querySelector('[data-filter="badge"][data-val="all"]')?.classList.add('active'); document.querySelectorAll('[data-filter="badge"]:not([data-val="all"])').forEach(b=>b.classList.remove('active')); } }); count++; }
  if (F.age !== 'all') { tags.push({ label: F.age+' tuổi', clear:()=>{ setFilter('age','all'); document.querySelector('[data-filter="age"][data-val="all"]')?.classList.add('active'); document.querySelectorAll('[data-filter="age"]:not([data-val="all"])').forEach(b=>b.classList.remove('active')); } }); count++; }
  if (_pricePreset !== 'all') { tags.push({ label: 'Giá: '+(_pricePreset==='u70'?'Dưới 70K':_pricePreset==='70-90'?'70–90K':'Trên 90K'), clear:()=>setPricePreset('all', document.querySelector('.price-quick-btn[data-val="all"]')) }); count++; }

  const container = document.getElementById('activeTags');
  container.innerHTML = tags.map((t,i) => `
  <span class="active-filter-tag">${t.label}<button onclick="(${t.clear.toString()})()" title="Bỏ lọc">✕</button></span>`).join('');

  activeCount.textContent = count;
  activeCount.classList.toggle('show', count > 0);
  if (activeCountMob) { activeCountMob.textContent = count; activeCountMob.style.display = count > 0 ? 'inline-flex' : 'none'; }
  document.getElementById('resetBtn').style.opacity = count > 0 ? '1' : '0.4';
}

function resetFilters() {
  F.cat='all'; F.badge='all'; F.age='all'; F.priceMin=0; F.priceMax=Infinity;
  _pricePreset='all';
  document.getElementById('searchQ').value='';
  document.getElementById('priceMin').value='';
  document.getElementById('priceMax').value='';
  document.getElementById('searchClear').classList.remove('show');
  document.getElementById('sortSel').value='';
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.val==='all'));
  document.querySelectorAll('.price-quick-btn').forEach(b => b.classList.toggle('active', b.dataset.val==='all'));
  applyFilters();
}

/* ─── Mobile drawer ─── */
function openMobileFilter() {
  document.getElementById('mobileDrawer').classList.add('open');
  document.body.style.overflow = 'hidden';
  // Clone filter sections into mobile
  const body = document.getElementById('mobileFilterBody');
  body.innerHTML = document.getElementById('filterSidebar').querySelector('[class*="filter-section"]') ?
    Array.from(document.getElementById('filterSidebar').querySelectorAll('.filter-section')).map(s=>s.outerHTML).join('') : '';
}
function closeMobileFilter(e) {
  if (e && e.target !== document.getElementById('mobileDrawer')) return;
  document.getElementById('mobileDrawer').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('mobileDrawer')?.addEventListener('click', e => {
  if(e.target===document.getElementById('mobileDrawer')) closeMobileFilter();
});

(async function initShop() {
  try {
    const { products } = await API.products.list();
    ALL_PRODUCTS = products.map(normalizeProduct);
    Cart.register(ALL_PRODUCTS);
    // Update category chip counts from actual API data
    const total = ALL_PRODUCTS.length;
    const kitCount = ALL_PRODUCTS.filter(p => p.cat === 'kit').length;
    const bookCount = ALL_PRODUCTS.filter(p => p.cat === 'book').length;
    document.querySelector('[data-filter="cat"][data-val="all"] .filter-chip-count').textContent = total;
    document.querySelector('[data-filter="cat"][data-val="kit"] .filter-chip-count').textContent = kitCount;
    document.querySelector('[data-filter="cat"][data-val="book"] .filter-chip-count').textContent = bookCount;
  } catch(e) {
    console.error('Không thể tải danh sách sản phẩm:', e);
    ALL_PRODUCTS = [];
  }
  applyFilters();
})();
</script>
</body>
</html>
