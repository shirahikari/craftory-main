<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài khoản của tôi · Craftory</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .account-layout{display:grid;grid-template-columns:220px 1fr;gap:32px;margin-top:32px}
    .account-nav{background:var(--surface);border:1px solid var(--parchment);border-radius:var(--r-lg);padding:16px;height:fit-content}
    .account-nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-md);font-family:var(--font-h);font-size:.87rem;font-weight:600;color:var(--ink-3);text-decoration:none;transition:all .15s;margin-bottom:4px}
    .account-nav a:hover,.account-nav a.active{background:var(--orange-pale);color:var(--orange)}
    .account-panel{background:var(--surface);border:1px solid var(--parchment);border-radius:var(--r-lg);padding:28px}
    .order-card{border:1px solid var(--parchment);border-radius:var(--r-md);padding:16px 20px;margin-bottom:16px;transition:box-shadow .2s}
    .order-card:hover{box-shadow:var(--sh-md)}
    .order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .order-id{font-family:var(--font-h);font-size:.8rem;font-weight:700;color:var(--ink-3)}
    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--r-full);font-size:.72rem;font-weight:700;font-family:var(--font-h);text-transform:uppercase;letter-spacing:.05em}
    .status-pending{background:#FEF9C3;color:#854D0E}.status-processing{background:#DBEAFE;color:#1D4ED8}
    .status-shipped{background:#D1FAE5;color:#065F46}.status-delivered{background:#D1FAE5;color:#065F46}
    .status-cancelled{background:#FEE2E2;color:#991B1B}
    .order-items{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .order-item-chip{background:var(--parchment);border-radius:var(--r-sm);padding:4px 10px;font-size:.78rem;font-family:var(--font-h);font-weight:600}
    .order-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--parchment)}
    @media(max-width:720px){.account-layout{grid-template-columns:1fr}.account-nav{display:flex;flex-wrap:wrap;gap:8px;padding:12px}}
  </style>
</head>
<body>
<div id="site-header"></div>
<div id="login-modal-mount"></div>
<main>
  <div class="container section-sm">
    <div id="auth-check" style="text-align:center;padding:60px 0">
      <div style="font-size:2rem;margin-bottom:16px">⏳</div>
      <p>Đang kiểm tra đăng nhập...</p>
    </div>
    <div id="account-content" style="display:none">
      <h1>Tài khoản của tôi</h1>
      <div class="account-layout">
        <nav class="account-nav">
          <a href="#orders" class="active" onclick="showTab('orders',this)">📦 Đơn hàng</a>
          <a href="#profile" onclick="showTab('profile',this)">👤 Hồ sơ</a>
          <a href="#" onclick="Auth.logout();return false" style="color:var(--rose)">🚪 Đăng xuất</a>
        </nav>
        <div>
          <!-- Orders panel -->
          <div id="tab-orders" class="account-panel">
            <h2 style="margin-bottom:20px;font-size:1.3rem">Đơn hàng của tôi</h2>
            <div id="orders-list"><div style="text-align:center;padding:40px 0;color:var(--ink-4)">Đang tải...</div></div>
          </div>
          <!-- Profile panel -->
          <div id="tab-profile" class="account-panel" style="display:none">
            <h2 style="margin-bottom:20px;font-size:1.3rem">Hồ sơ</h2>
            <div id="profile-info"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="not-logged-in" style="display:none;text-align:center;padding:80px 0">
      <div style="font-size:3rem;margin-bottom:16px">🔒</div>
      <h2>Vui lòng đăng nhập</h2>
      <p style="margin-bottom:24px">Đăng nhập để xem đơn hàng và thông tin tài khoản</p>
      <button class="btn btn-primary" onclick="LoginModal.open()">Đăng nhập ngay</button>
    </div>
  </div>
</main>
<div id="site-footer"></div>
<script src="../assets/js/env.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const STATUS_VN = { pending:'Chờ xác nhận', processing:'Đang xử lý', shipped:'Đang giao', delivered:'Đã giao', cancelled:'Đã hủy' };
const STATUS_CLS = { pending:'status-pending', processing:'status-processing', shipped:'status-shipped', delivered:'status-delivered', cancelled:'status-cancelled' };

document.getElementById('site-header').innerHTML = renderHeader('account', '../');
document.getElementById('site-footer').innerHTML = renderFooter('../');

function showTab(tab, el) {
  document.querySelectorAll('#tab-orders,#tab-profile').forEach(t=>t.style.display='none');
  document.getElementById('tab-'+tab).style.display='';
  document.querySelectorAll('.account-nav a').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  return false;
}

async function loadOrders() {
  try {
    const { orders } = await API.orders.list();
    const list = document.getElementById('orders-list');
    if (!orders.length) {
      list.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--ink-4)">
        <div style="font-size:2.5rem;margin-bottom:12px">📭</div>
        <p>Bạn chưa có đơn hàng nào.</p>
        <a href="shop.html" class="btn btn-primary" style="margin-top:12px;display:inline-block">Mua sắm ngay</a>
      </div>`;
      return;
    }
    list.innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="order-header">
          <div>
            <div class="order-id">Đơn #${o.id.slice(-8).toUpperCase()}</div>
            <div style="font-size:.78rem;color:var(--ink-4);margin-top:2px">${new Date(o.createdAt).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'})}</div>
          </div>
          <span class="status-badge ${STATUS_CLS[o.status]||''}">${STATUS_VN[o.status]||o.status}</span>
        </div>
        <div class="order-items">
          ${o.items.map(i=>`<span class="order-item-chip">${i.product?.emoji||'📦'} ${i.product?.name||'Sản phẩm'} ×${i.qty}</span>`).join('')}
        </div>
        <div class="order-footer">
          <div>
            <div style="font-size:.78rem;color:var(--ink-4)">Giao đến: ${o.shippingName} · ${o.shippingPhone}</div>
            <div style="font-size:.75rem;color:var(--ink-5);margin-top:2px">${o.shippingAddress}</div>
          </div>
          <div style="font-weight:700;color:var(--orange);font-family:var(--font-h)">${o.total.toLocaleString('vi-VN')}đ</div>
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('orders-list').innerHTML = `<div style="color:var(--rose);padding:20px 0">${e.message||'Lỗi tải đơn hàng'}</div>`;
  }
}

function showProfile(user) {
  document.getElementById('profile-info').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px">
      <div style="background:var(--cream-2);border-radius:var(--r-md);padding:16px">
        <div style="font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--orange);margin-bottom:6px">Họ tên</div>
        <div style="font-size:1rem;font-weight:600">${user.name}</div>
      </div>
      <div style="background:var(--cream-2);border-radius:var(--r-md);padding:16px">
        <div style="font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--orange);margin-bottom:6px">Email</div>
        <div style="font-size:1rem;font-weight:600">${user.email}</div>
      </div>
      <div style="background:var(--cream-2);border-radius:var(--r-md);padding:16px">
        <div style="font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--orange);margin-bottom:6px">Vai trò</div>
        <div style="font-size:1rem;font-weight:600;text-transform:capitalize">${user.role}</div>
      </div>
    </div>`;
}

Auth.onReady(async (user) => {
  document.getElementById('auth-check').style.display = 'none';
  if (!user) {
    document.getElementById('not-logged-in').style.display = 'block';
    return;
  }
  document.getElementById('account-content').style.display = 'block';
  showProfile(user);
  await loadOrders();
});
</script>
</body>
</html>
