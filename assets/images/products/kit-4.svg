<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="60%" r="55%"><stop offset="0%" stop-color="#FFFBEB"/><stop offset="100%" stop-color="#FEF3C7"/></radialGradient>
    <filter id="sf4"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(180,120,0,.2)"/></filter>
  </defs>
  <rect width="480" height="480" fill="url(#bg4)" rx="24"/>
  <!-- Sky background -->
  <rect x="0" y="0" width="480" height="280" fill="#EFF6FF" rx="24"/>
  <!-- Sun -->
  <circle cx="80" cy="80" r="36" fill="#FCD34D" opacity=".85" filter="url(#sf4)"/>
  <circle cx="80" cy="80" r="28" fill="#FBBF24"/>
  <!-- Clouds -->
  <ellipse cx="360" cy="80" rx="44" ry="24" fill="white" opacity=".8"/>
  <ellipse cx="396" cy="72" rx="30" ry="20" fill="white" opacity=".8"/>
  <ellipse cx="330" cy="78" rx="28" ry="18" fill="white" opacity=".7"/>
  <!-- Ground -->
  <rect x="0" y="370" width="480" height="110" fill="#86EFAC" rx="0"/>
  <ellipse cx="240" cy="370" rx="280" ry="16" fill="#4ADE80"/>
  <!-- Garden path -->
  <ellipse cx="240" cy="400" rx="60" ry="12" fill="#D97706" opacity=".4"/>
  <!-- House body -->
  <rect x="152" y="258" width="176" height="140" rx="6" fill="#F59E0B" filter="url(#sf4)"/>
  <!-- Shadow side -->
  <rect x="288" y="258" width="40" height="140" rx="0" fill="#D97706" opacity=".3"/>
  <!-- Roof -->
  <polygon points="128,262 240,145 352,262" fill="#C2410C" filter="url(#sf4)"/>
  <polygon points="128,262 240,158 352,262" fill="none" stroke="#9A3412" stroke-width="2"/>
  <!-- Roof tile lines -->
  <line x1="190" y1="262" x2="240" y2="162" stroke="#9A3412" stroke-width="1" opacity=".5"/>
  <line x1="290" y1="262" x2="240" y2="162" stroke="#9A3412" stroke-width="1" opacity=".5"/>
  <!-- Door -->
  <rect x="210" y="320" width="60" height="78" rx="8" fill="#92400E"/>
  <circle cx="264" cy="362" r="5" fill="#F59E0B"/>
  <rect x="240" y="320" width="2" height="78" fill="#7C2D12" opacity=".4"/>
  <!-- Windows -->
  <rect x="165" y="278" width="50" height="44" rx="6" fill="#BFDBFE" filter="url(#sf4)"/>
  <line x1="190" y1="278" x2="190" y2="322" stroke="#93C5FD" stroke-width="2"/>
  <line x1="165" y1="300" x2="215" y2="300" stroke="#93C5FD" stroke-width="2"/>
  <rect x="265" y="278" width="50" height="44" rx="6" fill="#BFDBFE" filter="url(#sf4)"/>
  <line x1="290" y1="278" x2="290" y2="322" stroke="#93C5FD" stroke-width="2"/>
  <line x1="265" y1="300" x2="315" y2="300" stroke="#93C5FD" stroke-width="2"/>
  <!-- Chimney -->
  <rect x="290" y="172" width="30" height="52" rx="4" fill="#92400E"/>
  <ellipse cx="305" cy="172" rx="15" ry="7" fill="#7C2D12"/>
  <!-- Smoke puffs -->
  <circle cx="305" cy="158" r="9" fill="#E5E7EB" opacity=".7"/>
  <circle cx="312" cy="143" r="7" fill="#E5E7EB" opacity=".5"/>
  <circle cx="306" cy="130" r="6" fill="#E5E7EB" opacity=".4"/>
  <!-- Flower garden -->
  <circle cx="128" cy="368" r="14" fill="#FCD34D"/>
  <circle cx="128" cy="368" r="7" fill="#F59E0B"/>
  <line x1="128" y1="382" x2="128" y2="400" stroke="#16A34A" stroke-width="3"/>
  <circle cx="352" cy="365" r="12" fill="#F9A8D4"/>
  <circle cx="352" cy="365" r="6" fill="#EC4899"/>
  <line x1="352" y1="377" x2="352" y2="398" stroke="#16A34A" stroke-width="3"/>
  <circle cx="100" cy="375" r="10" fill="#86EFAC"/>
  <circle cx="380" cy="372" r="11" fill="#A78BFA"/>
</svg>
